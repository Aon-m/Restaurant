<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Restaurant</title>
  </head>
  <body>
    <header>
      <!-- Aria Label title -->
      <h2 class="sr-hidden">Main Navigation</h2>

      <!-- Logo -->
      <svg
        class="nav__logo"
        xmlns="http://www.w3.org/2000/svg"
        viewBox="0 -960 960 960"
        fill="currentColor"
      >
        <path
          d="M480-520q-68-62-111-104.5T302-698q-24-31-33-54.5t-9-47.5q0-50 35-85t86-35q28 0 54 12.5t45 33.5q19-21 45-33.5t54-12.5q51 0 86 35t35 85q0 24-9 47.5T658-698q-24 31-67 73.5T480-520Zm0-108q72-66 106-107.5t34-64.5q0-17-12-28.5T579-840q-12 0-23.5 7T532-812l-51 59-51-57q-14-16-25.5-23t-23.5-7q-17 0-29 11.5T340-800q0 23 34 64.5T480-628ZM120-80v-122q-18-5-30-19t-14-34L40-640h25q23 0 40.5 16t19.5 39l24 265h171q33 0 56.5 23.5T400-240v40h-40v120h-60v-120H180v120h-60Zm320 0v-320H200q0-33 23.5-56.5T280-480h400q33 0 56.5 23.5T760-400H520v320h-80Zm160 0v-120h-40v-40q0-33 23.5-56.5T640-320h172l24-265q2-23 19-39t40-16h25l-35 385q-2 20-14.5 34T840-202v122h-60v-120H660v120h-60ZM480-628Z"
        />
      </svg>

      <!-- Hamburger -->
      <button
        class="nav__hamburger"
        type="button"
        aria-label="Open Menu"
        id="hamburger"
      >
        <svg width="20" height="14" xmlns="http://www.w3.org/2000/svg">
          <path
            d="M20 12v2H0v-2h20zm0-6v2H0V6h20zm0-6v2H0V0h20z"
            fill="currentColor"
            fill-rule="evenodd"
          />
        </svg>
      </button>

      <nav class="nav nav--desktop">
        <ul class="nav__links text text--small">
          <li class="nav__item">
            <button
              data-page="home"
              type="button"
              class="nav__link text text--small fast-slow-hover"
            >
              <span class="nav__index" aria-hidden="true">00</span>
              Home
            </button>
          </li>
          <li class="nav__item">
            <button
              data-page="menu"
              type="button"
              class="nav__link text text--small fast-slow-hover"
            >
              <span class="nav__index" aria-hidden="true">01</span>
              Menu
            </button>
          </li>
          <li class="nav__item">
            <button
              data-page="about"
              type="button"
              class="nav__link text text--small fast-slow-hover"
            >
              <span class="nav__index" aria-hidden="true">02</span>
              About
            </button>
          </li>
        </ul>
      </nav>

      <dialog id="mobileNav" class="nav--dialog" aria-label="Mobile navigation">
        <nav class="nav nav--mobile">
          <div class="nav__top">
            <svg
              class="nav__logo"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 -960 960 960"
              fill="currentColor"
            >
              <path
                d="M480-520q-68-62-111-104.5T302-698q-24-31-33-54.5t-9-47.5q0-50 35-85t86-35q28 0 54 12.5t45 33.5q19-21 45-33.5t54-12.5q51 0 86 35t35 85q0 24-9 47.5T658-698q-24 31-67 73.5T480-520Zm0-108q72-66 106-107.5t34-64.5q0-17-12-28.5T579-840q-12 0-23.5 7T532-812l-51 59-51-57q-14-16-25.5-23t-23.5-7q-17 0-29 11.5T340-800q0 23 34 64.5T480-628ZM120-80v-122q-18-5-30-19t-14-34L40-640h25q23 0 40.5 16t19.5 39l24 265h171q33 0 56.5 23.5T400-240v40h-40v120h-60v-120H180v120h-60Zm320 0v-320H200q0-33 23.5-56.5T280-480h400q33 0 56.5 23.5T760-400H520v320h-80Zm160 0v-120h-40v-40q0-33 23.5-56.5T640-320h172l24-265q2-23 19-39t40-16h25l-35 385q-2 20-14.5 34T840-202v122h-60v-120H660v120h-60ZM480-628Z"
              />
            </svg>

            <button
              type="button"
              class="nav__close-button"
              aria-label="Close Menu"
            >
              &times;
            </button>
          </div>

          <ul class="nav__links text text--small">
            <li class="nav__item">
              <button
                data-page="home"
                type="button"
                class="nav__link text text--small fast-slow-hover"
              >
                <span class="nav__index" aria-hidden="true">00</span>
                Home
              </button>
            </li>
            <li class="nav__item">
              <button
                data-page="menu"
                type="button"
                class="nav__link text text--small fast-slow-hover"
              >
                <span class="nav__index" aria-hidden="true">01</span>
                Menu
              </button>
            </li>
            <li class="nav__item">
              <button
                data-page="about"
                type="button"
                class="nav__link text text--small fast-slow-hover"
              >
                <span class="nav__index" aria-hidden="true">02</span>
                About
              </button>
            </li>
          </ul>
        </nav>
      </dialog>
    </header>
    <main id="content">
    </main>
    <template id="card-template">
      <div class="card">
        <div class="card__content">
          <div class="card__header">
            <h2 class="card__category text text--medium text--primary"></h2>
            <button
              type="button"
              class="button button--menu"
              aria-label="more options"
            >
              <svg
                class="icon icon--small"
                viewBox="0 0 21 5"
                xmlns="http://www.w3.org/2000/svg"
              >
                <path
                  d="M2.5 0a2.5 2.5 0 1 1 0 5 2.5 2.5 0 0 1 0-5Zm8 0a2.5 2.5 0 1 1 0 5 2.5 2.5 0 0 1 0-5Zm8 0a2.5 2.5 0 1 1 0 5 2.5 2.5 0 0 1 0-5Z"
                  fill="currentColor"
                  fill-rule="evenodd"
                />
              </svg>
            </button>
          </div>
          <picture class="card__image picture">
            <img class="picture__img card__image" data-src="../assets/images/default.jpg" alt="" />
          </picture>
          <div class="card__text-content">
            <p
              class="card__name text text--medium text--light text--primary"
            ></p>
            <p class="text text--small text--regular text--secondary">
              <span class="card__rating"></span
              ><span class="card__price"></span>
            </p>
          </div>
        </div>
      </div>
    </template>
  </body>
</html>
