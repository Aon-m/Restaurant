<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Restaurant</title>
  </head>
  <body>
    <header>
      <!-- Aria Label title -->
      <h2 class="sr-hidden">Main Navigation</h2>

      <!-- Logo -->
      <svg
        class="nav__logo icon icon--medium"
        xmlns="http://www.w3.org/2000/svg"
        viewBox="0 -960 960 960"
        fill="currentColor"
      >
        <path
          d="M480-520q-68-62-111-104.5T302-698q-24-31-33-54.5t-9-47.5q0-50 35-85t86-35q28 0 54 12.5t45 33.5q19-21 45-33.5t54-12.5q51 0 86 35t35 85q0 24-9 47.5T658-698q-24 31-67 73.5T480-520Zm0-108q72-66 106-107.5t34-64.5q0-17-12-28.5T579-840q-12 0-23.5 7T532-812l-51 59-51-57q-14-16-25.5-23t-23.5-7q-17 0-29 11.5T340-800q0 23 34 64.5T480-628ZM120-80v-122q-18-5-30-19t-14-34L40-640h25q23 0 40.5 16t19.5 39l24 265h171q33 0 56.5 23.5T400-240v40h-40v120h-60v-120H180v120h-60Zm320 0v-320H200q0-33 23.5-56.5T280-480h400q33 0 56.5 23.5T760-400H520v320h-80Zm160 0v-120h-40v-40q0-33 23.5-56.5T640-320h172l24-265q2-23 19-39t40-16h25l-35 385q-2 20-14.5 34T840-202v122h-60v-120H660v120h-60ZM480-628Z"
        />
      </svg>

      <!-- Hamburger -->
      <button
        class="nav__hamburger"
        type="button"
        aria-label="Open Menu"
        id="hamburger"
      >
        <svg width="20" height="14" xmlns="http://www.w3.org/2000/svg">
          <path
            d="M20 12v2H0v-2h20zm0-6v2H0V6h20zm0-6v2H0V0h20z"
            fill="currentColor"
            fill-rule="evenodd"
          />
        </svg>
      </button>

      <nav class="nav nav--desktop">
        <ul class="nav__links text text--small">
          <li class="nav__item underline-hover underline-hover--selected">
            <button
              data-page="home"
              type="button"
              class="nav__link text text--small text--secondary text--uppercase text--regular fast-slow-hover"
            >
              <span class="nav__index" aria-hidden="true">00</span>
              Home
            </button>
          </li>
          <li class="nav__item underline-hover">
            <button
              data-page="menu"
              type="button"
              class="nav__link text text--small text--secondary text--uppercase text--regular fast-slow-hover"
            >
              <span class="nav__index" aria-hidden="true">01</span>
              Menu
            </button>
          </li>
          <li class="nav__item underline-hover">
            <button
              data-page="about"
              type="button"
              class="nav__link text text--small text--secondary text--uppercase text--regular fast-slow-hover"
            >
              <span class="nav__index" aria-hidden="true">02</span>
              About
            </button>
          </li>
        </ul>
      </nav>

      <dialog id="mobileNav" class="nav--dialog" aria-label="Mobile navigation">
        <nav class="nav nav--mobile">
          <div class="nav__top">
            <svg
              class="nav__logo icon icon--large"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 -960 960 960"
              fill="currentColor"
            >
              <path
                d="M480-520q-68-62-111-104.5T302-698q-24-31-33-54.5t-9-47.5q0-50 35-85t86-35q28 0 54 12.5t45 33.5q19-21 45-33.5t54-12.5q51 0 86 35t35 85q0 24-9 47.5T658-698q-24 31-67 73.5T480-520Zm0-108q72-66 106-107.5t34-64.5q0-17-12-28.5T579-840q-12 0-23.5 7T532-812l-51 59-51-57q-14-16-25.5-23t-23.5-7q-17 0-29 11.5T340-800q0 23 34 64.5T480-628ZM120-80v-122q-18-5-30-19t-14-34L40-640h25q23 0 40.5 16t19.5 39l24 265h171q33 0 56.5 23.5T400-240v40h-40v120h-60v-120H180v120h-60Zm320 0v-320H200q0-33 23.5-56.5T280-480h400q33 0 56.5 23.5T760-400H520v320h-80Zm160 0v-120h-40v-40q0-33 23.5-56.5T640-320h172l24-265q2-23 19-39t40-16h25l-35 385q-2 20-14.5 34T840-202v122h-60v-120H660v120h-60ZM480-628Z"
              />
            </svg>

            <button
              type="button"
              class="nav__close-button"
              aria-label="Close Menu"
            >
              &times;
            </button>
          </div>

          <ul class="nav__links text text--small">
            <li class="nav__item underline-hover">
              <button
                data-page="home"
                type="button"
                class="nav__link text text--small text--secondary text--uppercase text--regular fast-slow-hover"
              >
                <span class="nav__index" aria-hidden="true">00</span>
                Home
              </button>
            </li>
            <li class="nav__item underline-hover">
              <button
                data-page="menu"
                type="button"
                class="nav__link text text--small text--secondary text--uppercase text--regular fast-slow-hover"
              >
                <span class="nav__index" aria-hidden="true">01</span>
                Menu
              </button>
            </li>
            <li class="nav__item underline-hover">
              <button
                data-page="about"
                type="button"
                class="nav__link text text--small text--secondary text--uppercase text--regular fast-slow-hover"
              >
                <span class="nav__index" aria-hidden="true">02</span>
                About
              </button>
            </li>
          </ul>
        </nav>
      </dialog>
    </header>
    <main id="content"></main>
    <template id="card-template">
      <div class="card">
        <div class="card__content">
          <div class="card__header">
            <h2 class="card__category text text--medium text--secondary"></h2>
            <button
              type="button"
              class="icon icon--medium button"
              aria-label="more options"
            >
              <svg
                class="icon icon--small"
                viewBox="0 0 21 5"
                xmlns="http://www.w3.org/2000/svg"
              >
                <path
                  d="M2.5 0a2.5 2.5 0 1 1 0 5 2.5 2.5 0 0 1 0-5Zm8 0a2.5 2.5 0 1 1 0 5 2.5 2.5 0 0 1 0-5Zm8 0a2.5 2.5 0 1 1 0 5 2.5 2.5 0 0 1 0-5Z"
                  fill="currentColor"
                  fill-rule="evenodd"
                />
              </svg>
            </button>
          </div>
          <picture class="card__image picture">
            <img
              class="picture__img card__image"
              data-src="../assets/images/default.jpg"
              alt=""
            />
          </picture>
          <div class="card__text-content">
            <p
              class="card__name text text--medium text--light text--secondary"
            ></p>
            <p
              class="card__footer text text--small text--secondary text--uppercase text--regular text--regular"
            >
              <span class="card__rating"></span
              ><span class="card__price"></span>
            </p>
          </div>
        </div>
      </div>
    </template>
    <template id="home-template">
      <section class="container container--flex">
        <h1
          class="flex-column text text--larger text__title text--primary text--bold"
        >
          <span class="text text--medium text--secondary text--regular">
            Welcome to
          </span>
          Date-Dinner
        </h1>
        <button
          data-page="menu"
          class="container__link button button--rectangle button--primary text text--regular text--medium"
          type="button"
        >
          View Menu
        </button>

        <button
          data-page="about"
          class="container__link button button--rectangle button--secondary text text--regular text--medium"
          type="button"
        >
          More About Us
        </button>
      </section>
    </template>
    <template id="menu-template">
      <section class="container container--flex">
        <div class="container__header">
          <h2
            class="text__title text text--large text--secondary text--uppercase"
          >
            <span>01</span>
            Menu
          </h2>
          <div class="container__input">
            <select
              class="input input--dropdown text text--secondary text--small text--bold"
              name="category"
              id="category-selector"
            >
              <option value="all">All</option>
              <option value="Main Course">Main Course</option>
              <option value="Appetizer">Appetizer</option>
              <option value="Salad">Salad</option>
              <option value="Dessert">Dessert</option>
              <option value="Beverage">Beverage</option>
              <option value="Light Meal">Light Meal</option>
            </select>
          </div>
        </div>

        <div class="container__sub-container"></div>
      </section>
    </template>
    <template id="about-template">
      <section class="container container--flex">
        <div class="container__header">
          <h2
            class="text__title text text--large text--secondary text--uppercase"
          >
            <span>02</span>
            About us
          </h2>
        </div>

        <div class="container__sub-container">
          <div class="container container--flex">
            <div class="container__navigation">
              <button
                type="button"
                class="button button--navigation"
                id="back-btn"
              >
                <svg
                  class="icon icon--small icon--bold"
                  viewBox="0 0 14 24"
                  xmlns="http://www.w3.org/2000/svg"
                >
                  <path
                    class="icon__path"
                    d="M13 0L1 12l12 12"
                    stroke="currentColor"
                    fill="none"
                    fill-rule="evenodd"
                  />
                </svg>
              </button>
              <button
                type="button"
                class="button button--navigation"
                id="forward-btn"
              >
                <svg
                  class="icon icon--small icon--bold"
                  viewBox="0 0 14 24"
                  xmlns="http://www.w3.org/2000/svg"
                >
                  <path
                    class="icon__path"
                    d="M1 0l12 12L1 24"
                    stroke="currentColor"
                    fill="none"
                    fill-rule="evenodd"
                  />
                </svg>
              </button>
            </div>
            <div
              class="container__image order-mobile-first order-desktop-last"
            ></div>

            <div class="container__text-content">
              <h3
                class="text--secondary text--uppercase text text--medium"
                id="role"
              >
                Chef
              </h3>
              <h3
                class="text--secondary text--uppercase text text--large"
                id="name"
              >
                Antony
              </h3>
              <p
                id="bio"
                class="text__description text text--small text--secondary"
              >
                Lorem ipsum dolor sit amet consectetur adipisicing elit culpa
                libero accusantium possimus autem sint nesciunt.
              </p>
              <div
                class="container__indicators order-mobile-first order-desktop-last"
              >
                <div class="indicator"></div>

                <div class="indicator"></div>

                <div class="indicator"></div>

                <div class="indicator"></div>

                <div class="indicator"></div>
              </div>
            </div>
          </div>
        </div>
      </section>
    </template>
  </body>
</html>
